<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SPIRIT Wildlife Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Share+Tech+Mono&family=Exo+2&display=swap" rel="stylesheet">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="scanline"></div>

<header>
  <h1>🐯 SPIRIT</h1>
  <div class="header-right">
    <span class="live-dot"></span>
    <span>LIVE</span>
    <span id="clock"></span>
  </div>
</header>

<main class="grid">

  <section class="card eco">
    <h2>ECO SCORE</h2>
    <svg viewBox="0 0 120 120" class="donut">
      <circle cx="60" cy="60" r="50" class="bg"></circle>
      <circle cx="60" cy="60" r="50" class="progress" id="ecoRing"></circle>
    </svg>
    <div id="ecoValue">--</div>
    <div id="ecoStatus"></div>
    <div id="ecoBreakdown"></div>
  </section>

  <section class="card zones">
    <h2>ZONES</h2>
    <div id="zones"></div>
  </section>

  <section class="card prediction">
    <h2>PREDICTION</h2>
    <div id="prediction"></div>
  </section>

  <section class="card water">
    <h2>WATERHOLES</h2>
    <div id="water"></div>
  </section>

  <section class="card animals">
    <h2>DETECTIONS</h2>
    <div id="animals"></div>
  </section>

  <section class="card alerts full">
    <h2>ALERT FEED</h2>
    <div id="alerts"></div>
  </section>

  <section class="card camera full">
    <h2>🎥 LIVE CAMERA — GEMINI VISION DETECTION</h2>

    <div class="camera-grid">
      <div>
        <video id="video" autoplay playsinline></video>
        <select id="zoneSelect">
          <option>A</option>
          <option>B</option>
          <option>C</option>
        </select>
        <button id="captureBtn">📸 CAPTURE & DETECT</button>
        <canvas id="canvas" hidden></canvas>
      </div>

      <div id="analysis">
        Waiting for capture...
      </div>
    </div>
  </section>

</main>

<div id="connection">● CONNECTING</div>

<script src="script.js"></script>
</body>
</html>
